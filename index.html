<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Glow Categories ✨</title>
    <style>
        :root {
            --bg: #fff5f5;
            --text-dark: #664d51;
            --border-light: #fcd0d7;
            --accent: #ff85a1;
            
            --yellow: #f9e2af; 
            --green: #a6e3a1;  
            --blue: #89b4fa;   
            --purple: #cba6f7; 
            
            --tile-bg: #ffffff;
            --tile-selected: #ffe3e8;
        }

        * { box-sizing: border-box; touch-action: manipulation; user-select: none; }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; overflow: hidden; position: fixed;
            background-image: radial-gradient(#ffe3e8 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }

        #game-layout {
            display: flex; flex-direction: column; gap: 12px; align-items: center; 
            justify-content: space-between; width: 95vw; max-width: 340px; height: 85svh; 
        }

        #header {
            display: flex; width: 100%; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.85); border: 1.5px solid #fff;
            border-radius: 12px; padding: 8px 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        h1 { margin: 0; font-size: 14px; color: var(--text-dark); letter-spacing: 0.5px; font-weight: 800; }

        #mistakes-tracker { font-size: 11px; font-weight: bold; color: var(--text-dark); display: flex; gap: 4px; align-items: center; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
        .dot.lost { background: #d3c4c4; }

        #grid { display: flex; flex-direction: column; gap: 6px; width: 100%; flex: 1; justify-content: center; }
        .row-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; }

        .category-resolved {
            width: 100%; min-height: 52px; border-radius: 10px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; color: #fff; font-weight: 800; padding: 6px;
        }
        .cat-title { font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; }
        .cat-items { font-size: 9px; font-weight: 500; opacity: 0.9; margin-top: 1px; }

        .tile {
            background: var(--tile-bg); border: 1.5px solid var(--border-light); border-radius: 10px; 
            min-height: 52px; display: flex; align-items: center; justify-content: center; font-size: 9.5px; 
            font-weight: 700; color: var(--text-dark); text-align: center; text-transform: uppercase; padding: 4px; 
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: background-color 0.15s, transform 0.1s;
        }
        .tile.selected { background: var(--tile-selected); border-color: var(--accent); transform: scale(1.02); }

        #control-panel { display: flex; gap: 10px; width: 100%; justify-content: center; margin-bottom: 5px; }
        .action-btn {
            padding: 8px 16px; background: #ffffff; color: var(--text-dark); border: 1.5px solid var(--border-light); 
            border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; flex: 1; max-width: 110px; text-align: center;
        }
        .action-btn.submit-ready { background: var(--text-dark); color: #fff; border-color: var(--text-dark); }
    </style>
</head>
<body>

<div id="game-layout">
    <div id="header">
        <h1 id="game-title">ROUND 1 / 3</h1>
        <div id="mistakes-tracker">
            <span>Lives:</span>
            <div class="dot" id="dot-1"></div>
            <div class="dot" id="dot-2"></div>
            <div class="dot" id="dot-3"></div>
            <div class="dot" id="dot-4"></div>
        </div>
    </div>

    <div id="grid"></div>

    <div id="control-panel">
        <button class="action-btn" id="btn-shuffle">Shuffle</button>
        <button class="action-btn" id="btn-submit">Submit</button>
    </div>
</div>

<script>
    const gridEl = document.getElementById('grid');
    const shuffleBtn = document.getElementById('btn-shuffle');
    const submitBtn = document.getElementById('btn-submit');
    const titleEl = document.getElementById('game-title');

    // --- 3 ROUND MASTER GAME DATABASE ---
    const gameRounds = [
        // ROUND 1
        [
            { id: "r1c1", title: "Palindromes", type: "yellow", items: ["KAYAK", "RACECAR", "LEVEL", "MOM"] },
            { id: "r1c2", title: "Types of storage", type: "green", items: ["CLOUD", "DRIVE", "BOX", "CHEST"] },
            { id: "r1c3", title: "Things that can form a chain", type: "blue", items: ["SNAKE", "DAISY", "ISLAND", "REACTION"] },
            { id: "r1c4", title: "Homophones of numbers", type: "purple", items: ["FOR", "WON", "TOO", "ATE"] }
        ],
        // ROUND 2
        [
            { id: "r2c1", title: "Things with keys", type: "yellow", items: ["PIANO", "LAPTOP", "MAP", "HOTEL"] },
            { id: "r2c2", title: "Shades of red", type: "green", items: ["ROSE", "CHERRY", "BRICK", "RUBY"] },
            { id: "r2c3", title: "Square things", type: "blue", items: ["GRID", "TILE", "CUBE", "BOARD"] },
            { id: "r2c4", title: "Words before 'Cake'", type: "purple", items: ["STRAWBERRY", "POUND", "SPONGE", "FUNNEL"] }
        ],
        // ROUND 3
        [
            { id: "r3c1", title: "Beach items", type: "yellow", items: ["SHELL", "SAND", "WAVE", "SHADE"] },
            { id: "r3c2", title: "Things that spark", type: "green", items: ["FLINT", "MATCH", "WIRE", "IDEA"] },
            { id: "r3c3", title: "Found on a computer screen", type: "blue", items: ["WINDOW", "ICON", "CURSOR", "MENU"] },
            { id: "r3c4", title: "Anagrams of 'SWEET'", type: "purple", items: ["WEETS", "TWEES", "STEEP", "EWEST"] } 
        ]
    ];

    let currentRoundIndex = 0;
    let poolItems = [];     
    let selectedIds = [];   
    let mistakesLeft = 4;
    let gameOver = false;

    function startRound(index) {
        if (index >= gameRounds.length) {
            titleEl.innerText = "ALL ROUNDS CLEARED! 🎉";
            gridEl.innerHTML = '<div style="text-align:center; color:var(--text-dark); font-weight:bold;">Amazing work! Scroll down in your chat for the complete answer grid! ✨</div>';
            shuffleBtn.style.display = 'none';
            submitBtn.style.display = 'none';
            return;
        }

        currentRoundIndex = index;
        titleEl.innerText = `ROUND ${currentRoundIndex + 1} / 3`;
        selectedIds = [];
        mistakesLeft = 4;
        gameOver = false;
        
        for (let i = 1; i <= 4; i++) {
            document.getElementById(`dot-${i}`).classList.remove('lost');
        }

        poolItems = [];
        gameRounds[currentRoundIndex].forEach(category => {
            category.resolved = false; // Reset status flag
            category.items.forEach(itemWord => {
                poolItems.push({ text: itemWord, categoryId: category.id });
            });
        });

        shufflePool();
        render();
    }

    function shufflePool() {
        for (let i = poolItems.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [poolItems[i], poolItems[j]] = [poolItems[j], poolItems[i]];
        }
    }

    function handleTileSelection(tileObj, element) {
        if (gameOver) return;
        const idx = selectedIds.indexOf(tileObj.text);
        if (idx !== -1) {
            selectedIds.splice(idx, 1);
            element.classList.remove('selected');
        } else {
            if (selectedIds.length < 4) {
                selectedIds.push(tileObj.text);
                element.classList.add('selected');
            }
        }
        if (selectedIds.length === 4) submitBtn.classList.add('submit-ready');
        else submitBtn.classList.remove('submit-ready');
    }

    function verifySelections() {
        if (selectedIds.length !== 4 || gameOver) return;

        const selectedObjects = poolItems.filter(item => selectedIds.includes(item.text));
        const sampleCatId = selectedObjects[0].categoryId;
        const isMatch = selectedObjects.every(obj => obj.categoryId === sampleCatId);

        if (isMatch) {
            gameRounds[currentRoundIndex].find(cat => cat.id === sampleCatId).resolved = true;
            poolItems = poolItems.filter(item => item.categoryId !== sampleCatId);
            selectedIds = [];
            render();
            checkRoundCompleteState();
        } else {
            mistakesLeft--;
            const targetDot = document.getElementById(`dot-${mistakesLeft + 1}`);
            if (targetDot) targetDot.classList.add('lost');

            const catCounts = {};
            selectedObjects.forEach(obj => { catCounts[obj.categoryId] = (catCounts[obj.categoryId] || 0) + 1; });
            if (Object.values(catCounts).includes(3)) alert("One away! ✧");
            else alert("Incorrect! ✕");

            if (mistakesLeft <= 0) {
                gameOver = true;
                setTimeout(() => {
                    alert("Round Failed! Moving onto the next round... 💔");
                    startRound(currentRoundIndex + 1);
                }, 500);
            }
        }
        submitBtn.classList.remove('submit-ready');
    }

    function checkRoundCompleteState() {
        const totalSolved = gameRounds[currentRoundIndex].filter(cat => cat.resolved).length;
        if (totalSolved === 4) {
            setTimeout(() => {
                alert(`✧ Round ${currentRoundIndex + 1} Cleared! Preparing Next Round... ✧`);
                startRound(currentRoundIndex + 1);
            }, 600);
        }
    }

    function render() {
        gridEl.innerHTML = '';

        gameRounds[currentRoundIndex].forEach(category => {
            if (category.resolved) {
                const bar = document.createElement('div');
                bar.className = 'category-resolved';
                bar.style.backgroundColor = `var(--${category.type})`;
                bar.innerHTML = `<div class="cat-title">${category.title}</div><div class="cat-items">${category.items.join(', ')}</div>`;
                gridEl.appendChild(bar);
            }
        });

        const remainingTiles = poolItems.length;
        if (remainingTiles > 0) {
            const rowsCount = remainingTiles / 4;
            for (let r = 0; r < rowsCount; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row-container';
                for (let c = 0; c < 4; c++) {
                    const tileIndex = r * 4 + c;
                    const tileData = poolItems[tileIndex];
                    const tileNode = document.createElement('div');
                    tileNode.className = 'tile';
                    tileNode.innerText = tileData.text;

                    if (selectedIds.includes(tileData.text)) tileNode.classList.add('selected');

                    const trigger = (e) => { e.preventDefault(); handleTileSelection(tileData, tileNode); };
                    tileNode.addEventListener('touchstart', trigger);
                    tileNode.addEventListener('mousedown', trigger);

                    rowDiv.appendChild(tileNode);
                }
                gridEl.appendChild(rowDiv);
            }
        }
    }

    shuffleBtn.onclick = (e) => { e.preventDefault(); shufflePool(); render(); };
    submitBtn.onclick = (e) => { e.preventDefault(); verifySelections(); };

    startRound(0);
</script>
</body>
</html>
